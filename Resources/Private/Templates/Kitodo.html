<f:layout name="KitodoPage" />

<f:section name="MainContent">
    <f:render section="ControlBar" partial="KitodoControlBar" arguments="{_all}" />
    <f:if condition="{isAudio} == 1 OR {isVideo} == 1">
        <f:then>
            <f:render section="PageView" partial="KitodoMediaplayer" arguments="{_all}" />
        </f:then>
        <f:else>
            <!--TYPO3SEARCH_begin-->
            <f:render section="PageView" partial="KitodoPageView" arguments="{_all}" />
            <!--TYPO3SEARCH_end-->
        </f:else>
    </f:if>
</f:section>
